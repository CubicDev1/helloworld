<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grocify - Quick Add Item</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#341100",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#2e3132",
              "inverse-on-surface": "#f0f1f2",
              "primary-fixed-dim": "#4ae176",
              "on-background": "#191c1d",
              "on-tertiary": "#ffffff",
              "surface": "#f8f9fa",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "on-surface-variant": "#3d4a3d",
              "error": "#ba1a1a",
              "inverse-primary": "#4ae176",
              "surface-container-high": "#e7e8e9",
              "on-secondary-container": "#476c5b",
              "secondary": "#416656",
              "on-tertiary-container": "#6d2d00",
              "on-primary-container": "#004b1e",
              "error-container": "#ffdad6",
              "surface-variant": "#e1e3e4",
              "tertiary-fixed": "#ffdbca",
              "tertiary-container": "#ff8e4d",
              "primary": "#006e2f",
              "surface-bright": "#f8f9fa",
              "secondary-fixed-dim": "#a8cfbc",
              "on-primary-fixed": "#002109",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e1e3e4",
              "primary-fixed": "#6bff8f",
              "surface-dim": "#d9dadb",
              "on-secondary-fixed-variant": "#294e3f",
              "tertiary-fixed-dim": "#ffb690",
              "tertiary": "#9d4300",
              "on-primary-fixed-variant": "#005321",
              "primary-container": "#22c55e",
              "outline-variant": "#bccbb9",
              "background": "#f8f9fa",
              "on-surface": "#191c1d",
              "on-secondary-fixed": "#002115",
              "secondary-fixed": "#c3ecd7",
              "outline": "#6d7b6c",
              "on-error": "#ffffff",
              "surface-tint": "#006e2f",
              "surface-container-low": "#f3f4f5",
              "surface-container": "#edeeef",
              "on-tertiary-fixed-variant": "#783200",
              "secondary-container": "#c3ecd7"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9fa;
            color: #191c1d;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen relative overflow-hidden">
<!-- Background Layer (Blurred Grocery Board) -->
<main class="fixed inset-0 z-0 blur-md opacity-40 scale-105 pointer-events-none">
<header class="bg-white/80 backdrop-blur-xl fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 shadow-sm shadow-green-900/5">
<h1 class="font-headline font-bold tracking-tight text-xl text-green-800">The Organic Concierge</h1>
<div class="w-10 h-10 rounded-full bg-stone-200"></div>
</header>
<div class="p-6 pt-24 space-y-6">
<div class="h-40 w-full rounded-lg bg-surface-container-low"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 rounded-lg bg-surface-container-low"></div>
<div class="h-32 rounded-lg bg-surface-container-low"></div>
<div class="h-32 rounded-lg bg-surface-container-low"></div>
<div class="h-32 rounded-lg bg-surface-container-low"></div>
</div>
<div class="h-64 w-full rounded-lg bg-surface-container-low"></div>
</div>
</main>
<!-- Overlay/Scrim -->
<div class="fixed inset-0 bg-stone-900/20 backdrop-blur-[2px] z-40"></div>
<!-- Bottom Sheet Modal -->
<div class="fixed inset-x-0 bottom-0 z-50 transform transition-transform duration-300">
<div class="mx-auto max-w-lg bg-surface-container-lowest rounded-t-xl shadow-[0_-8px_40px_rgba(0,0,0,0.08)] flex flex-col p-8 pb-12">
<!-- Handle -->
<div class="w-12 h-1.5 bg-stone-200 rounded-full self-center mb-8"></div>
<!-- Title -->
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Quick Add Item</h2>
</header>
<!-- Form Content -->
<div class="space-y-8">
<!-- Text Input -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant/60 ml-1">Item Name</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-5 font-body text-on-surface focus:ring-2 focus:ring-primary-container transition-all" placeholder="Ex: Organic Blueberries" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">shopping_basket</span>
</div>
</div>
<!-- Quantity Selector -->
<div class="flex items-center justify-between">
<span class="font-label text-sm font-semibold text-on-surface">Quantity</span>
<div class="flex items-center bg-surface-container-low rounded-full p-1.5 gap-4">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-sm hover:bg-stone-50 active:scale-95 transition-all text-on-surface">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="font-headline font-bold text-lg w-4 text-center">1</span>
<button class="w-10 h-10 flex items-center justify-center bg-primary-container text-on-primary-container rounded-full shadow-sm hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
<!-- Category Section -->
<div class="space-y-4">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant/60 ml-1">Category</label>
<div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
<button class="flex-none px-6 py-2.5 bg-primary text-white rounded-full font-body text-sm font-medium shadow-md shadow-primary/10">Produce</button>
<button class="flex-none px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-full font-body text-sm font-medium hover:bg-stone-200 transition-colors">Dairy</button>
<button class="flex-none px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-full font-body text-sm font-medium hover:bg-stone-200 transition-colors">Bakery</button>
<button class="flex-none px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-full font-body text-sm font-medium hover:bg-stone-200 transition-colors">Pantry</button>
<button class="flex-none px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-full font-body text-sm font-medium hover:bg-stone-200 transition-colors">Snacks</button>
<button class="flex-none px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-full font-body text-sm font-medium hover:bg-stone-200 transition-colors">Drinks</button>
</div>
</div>
<!-- Priority Section -->
<div class="space-y-4">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant/60 ml-1">Priority</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center py-4 rounded-lg border-2 border-primary-container/20 text-on-primary-container bg-primary-container/5 hover:bg-primary-container/10 transition-all active:scale-95">
<span class="font-body text-sm font-bold">Low</span>
</button>
<button class="flex flex-col items-center justify-center py-4 rounded-lg border-2 border-tertiary-container/30 text-on-tertiary-container bg-tertiary-container/5 hover:bg-tertiary-container/10 transition-all active:scale-95">
<span class="font-body text-sm font-bold">Medium</span>
</button>
<button class="flex flex-col items-center justify-center py-4 rounded-lg border-2 border-error/20 text-error bg-error/5 hover:bg-error/10 transition-all active:scale-95">
<span class="font-body text-sm font-bold">High</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-16 bg-primary-container text-on-primary-container rounded-lg font-headline font-bold text-lg shadow-lg shadow-primary-container/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4">
<span>Add Item</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-20 right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-40 left-[-5%] w-80 h-80 bg-tertiary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
