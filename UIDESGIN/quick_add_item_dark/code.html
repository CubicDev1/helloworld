              "on-secondary-container": "#c3ecd7",
              "secondary": "#a8cfbc",
              "on-tertiary-container": "#ffdbca",
              "on-primary-container": "#004b1e",
              "error-container": "#ffdad6",
              "surface-variant": "#3d4a3d",
              "tertiary-fixed": "#ffdbca",
              "tertiary-container": "#ff8e4d",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30">
<!-- Blurred Background Content (The "Main Grocery Board") -->
<div class="fixed inset-0 z-0 overflow-y-auto filter blur-md opacity-40 scale-105 pointer-events-none">
<header class="p-6 flex justify-between items-center">
<h1 class="text-2xl font-headline font-bold tracking-tight text-primary-container">The Organic Concierge</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
</header>
<main class="px-6 space-y-8 pb-32">
<!-- Featured Section -->
<section>
<div class="h-48 w-full rounded-lg overflow-hidden relative">
<img class="w-full h-full object-cover" data-alt="dramatic overhead shot of dark organic vegetables on a rustic stone table with deep moody lighting and green accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZGxvpFR0u_y39jmLBhP6M8SkGbrfOLh7356OGDRuBCB8sWrzb66W9BZTBf2jdzGGV22wlcPS2tu0qIniS0EMlmrc6F3xc3uJ5_hGJ6sS7SJ7ZFDEUWfMmsxQpgGf6R_Tn64BOzlnQQ7UWv_mpcUuNPONXxx3Fx7hogMaWC4i5xx2DDCmKgB1ieW-j55TgyJ7AziJwV_qk2BgYt3YYVoZqaKDLaYKILrSJRg2LCKOLSV6jBqzMl5FqFl6ac8dkDht0BQjanArt33w"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
</div>
</section>
<!-- Bento Grid Mockup -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-6 rounded-lg h-40"></div>
<div class="bg-surface-container-low p-6 rounded-lg h-60 row-span-2"></div>
<div class="bg-surface-container-low p-6 rounded-lg h-40"></div>
</div>
</main>
</div>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 bg-black/60 z-40 backdrop-blur-[2px]"></div>
<!-- Bottom Sheet UI -->
<div class="fixed bottom-0 left-0 right-0 z-50 flex justify-center">
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-t-xl shadow-2xl px-6 pt-3 pb-10 border-t border-white/5">
<!-- Handle bar -->
<div class="flex justify-center mb-6">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<header class="mb-8">
<h2 class="text-2xl font-headline font-bold text-on-surface tracking-tight">Quick Add Item</h2>
<p class="text-on-surface-variant text-sm mt-1">Add a new essential to your weekly harvest.</p>
</header>
<div class="space-y-8">
<!-- Item Name Input -->
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60 ml-2">Item Name</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-md px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary-container/50 transition-all text-lg" placeholder="Ex: Organic Blueberries" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-container">eco</span>
</div>
</div>
<!-- Quantity Selector -->
<div class="flex items-center justify-between bg-surface-container-low p-5 rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">layers</span>
<span class="font-headline font-semibold text-on-surface">Quantity</span>
</div>
<div class="flex items-center gap-6 bg-surface-container-highest/50 p-1.5 rounded-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:bg-surface-container-highest transition-colors active:scale-90">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-xl font-bold text-on-surface min-w-[1.5rem] text-center">1</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container hover:opacity-90 transition-all active:scale-90">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
<!-- Category Section -->
<div class="space-y-4">
<div class="flex items-center justify-between px-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60">Category</label>
<span class="text-[10px] text-primary-container/80 font-medium">VIEW ALL</span>
</div>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 -mx-2 px-2">
<!-- Selected Chip -->
<button class="flex-none px-6 py-2.5 rounded-full bg-primary text-on-primary text-sm font-semibold flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-weight="fill">spa</span> Produce
                        </button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">
                            Dairy
                        </button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">
                            Bakery
                        </button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">
                            Pantry
                        </button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">
                            Snacks
                        </button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">
                            Drinks
                        </button>
</div>
</div>
<!-- Priority Section -->
<div class="space-y-4">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60 ml-2">Priority</label>
<div class="grid grid-cols-3 gap-3">
<button class="py-3 rounded-md border-2 border-primary-container/20 text-primary-container font-semibold text-sm hover:bg-primary-container/5 transition-all flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container"></div> Low
                        </button>
<button class="py-3 rounded-md border-2 border-tertiary-container/40 text-tertiary-container font-semibold text-sm hover:bg-tertiary-container/5 transition-all flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary-container"></div> Medium
                        </button>
<button class="py-3 rounded-md border-2 border-error/40 text-error font-semibold text-sm hover:bg-error/5 transition-all flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-error"></div> High
                        </button>
</div>
</div>
<!-- Main Action Button -->
<button class="w-full bg-primary-container py-5 rounded-lg text-on-primary-container font-headline font-bold text-lg shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3 mt-4">
<span class="material-symbols-outlined" data-weight="fill">add_shopping_cart</span>
                    Add Item
                </button>
</div>
</div>
</div>
<!-- Predicted BottomNavBar Component Execution -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-8px_30px_rgb(0,0,0,0.04)] rounded-t-[2.5rem] opacity-20 pointer-events-none">
<div class="flex flex-col items-center justify-center bg-green-500/10 dark:bg-green-400/10 text-green-700 dark:text-green-300 rounded-full px-5 py-2">
<span class="material-symbols-outlined">shopping_basket</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase">Shop</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase">Lists</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase">Recipes</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2">
<span class="material-symbols-outlined">person</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase">Profile</span>
</div>
</nav>
</body></html>
